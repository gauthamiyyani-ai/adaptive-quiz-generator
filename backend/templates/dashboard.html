<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Adaptive Quiz</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

<div class="dashboard-wrapper">

    <!-- Header -->
    <div class="dashboard-header modern-header">
        <div>
            <h2>My Learning Dashboard</h2>
            <p class="dashboard-subtitle">Track your progress and improve your knowledge</p>
        </div>
        <div class="dashboard-actions">
            <a href="/admin-page">Admin Panel</a>
        </div>
    </div>

    <!-- PERSONAL ANALYTICS -->
    <div class="analytics-grid">
        <div class="analytics-card">
            <h3 id="myScore">0</h3>
            <p>My Score</p>
        </div>

        <div class="analytics-card">
            <h3 id="myAccuracy">0%</h3>
            <p>Accuracy</p>
        </div>

        <div class="analytics-card">
            <h3 id="myAvgTime">0s</h3>
            <p>Avg Response Time</p>
        </div>

        <div class="analytics-card">
            <h3 id="knowledgeLevel">Beginner</h3>
            <p>Knowledge Level</p>
        </div>
    </div>

    <!-- GRAPH SECTION -->
    <div class="dashboard-card">
        <h3>Performance Analysis</h3>
        <p class="chart-subtitle">Your current quiz accuracy</p>
        <canvas id="accuracyChart" height="120"></canvas>
    </div>

    <!-- Upload Section -->
    <div class="dashboard-card">

        <h3>Upload Learning Material</h3>

        <!-- ================= UPLOAD TABS ================= -->
        <div class="upload-tabs">
            <button onclick="showTab('text')" class="tab-btn active">Paste Text</button>
            <button onclick="showTab('url')" class="tab-btn">Enter Topic / URL</button>
            <button onclick="showTab('pdf')" class="tab-btn">Upload PDF</button>
        </div>

        <!-- TEXT -->
        <div id="text" class="upload-content active">
            <textarea id="content" placeholder="Paste your learning material here..."></textarea>
        </div>

        <!-- URL / TOPIC -->
        <div id="url" class="upload-content">
            <input type="text" id="urlInput" placeholder="Enter topic or URL">
        </div>

        <!-- PDF -->
        <div id="pdf" class="upload-content">
            <input type="file" id="fileInput" accept=".pdf">
        </div>

        <!-- QUIZ SETTINGS -->
        <hr style="margin:30px 0;">

        <h3>Quiz Settings</h3>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">

            <div>
                <label>Difficulty Level</label>
                <select id="difficultyLevel">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>

            <div>
                <label>Number of MCQ</label>
                <input type="number" id="mcqCount" value="2" min="0">
            </div>

            <div>
                <label>Number of True/False</label>
                <input type="number" id="tfCount" value="2" min="0">
            </div>

            <div>
                <label>Number of Short Answer</label>
                <input type="number" id="shortCount" value="1" min="0">
            </div>

            <div>
                <label>Number of Long Answer</label>
                <input type="number" id="longCount" value="1" min="0">
            </div>

        </div>

        <button id="uploadBtn" onclick="uploadContent()" style="margin-top:25px;">
            Upload & Generate Quiz
        </button>

        <div id="processingStatus" class="processing-status"></div>

    </div>

</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
